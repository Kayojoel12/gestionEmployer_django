{% extends "employes/layout.html" %}


{% block content %}
<div>
    <a class="btn btn-base-200 w-full" href="{% url 'ajouter_employes' %}">Ajouter un emloyes</a>
</div>
<div class="space-y-4 w-full">
    {% for employe in employes%}
    <div class="flex p-4 bg-base-100 w-full h-fit justify-between rounded-lg items-center">
        <div class="space-y-2">
            <p class="font-bold text-lg">{{employe.nom}}</p>

            <p class="badge badge-ghost">{{employe.email}}</p>
            <div class="flex gap-2">
                <p class="font-bold text-lg">{{employe.poste}}</p>

                <p class="badge badge-ghost">{{employe.salaire}}fcfa</p>

            </div>
        </div>

        <div class="space-x-2">
            <a href="{% url 'modifier_employes' id=employe.id %}" class="btn btn-base-content  btn-sm rounded-3xl">modifier un employes</a>

            <a href="{% url 'supprimer_employes' id=employe.id %}" class="btn btn-error btn-soft btn-sm rounded-3xl">supprimer un employes</a>

        </div>
    </div>
    {%endfor %}

</div>
{%endblock %}
